  <g opacity="0.08" stroke="#c0392b" fill="none" stroke-linecap="round">
    <ellipse cx="22" cy="80" rx="8" ry="9" stroke-width="1.3"/>
    <line x1="22" y1="89" x2="22" y2="112" stroke-width="1.3"/>
    <line x1="17" y1="106" x2="27" y2="112" stroke-width="1"/>
  </g>

  <!-- Fork (bottom-right) -->
  <g opacity="0.08" stroke="#c0392b" fill="none" stroke-linecap="round">
    <line x1="86" y1="70" x2="86" y2="112" stroke-width="1.3"/>
