<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <!-- Cooking pot with steam (top-left) -->
  <g opacity="0.09" stroke="#c0392b" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <ellipse cx="30" cy="40" rx="14" ry="5" stroke-width="1.4"/>
    <path d="M16 40 Q16 56 30 56 Q44 56 44 40" stroke-width="1.4"/>
    <line x1="16" y1="43" x2="10" y2="43" stroke-width="1.4"/>
    <line x1="44" y1="43" x2="50" y2="43" stroke-width="1.4"/>
    <path d="M24 32 Q22 26 24 20" stroke-width="1.1"/>
    <path d="M30 32 Q28 26 30 20" stroke-width="1.1"/>
    <path d="M36 32 Q34 26 36 20" stroke-width="1.1"/>
  </g>

  <!-- Palm / plantain leaf (top-right) -->
  <g opacity="0.08" stroke="#c0392b" fill="none" stroke-linecap="round">
    <path d="M90 8 Q106 24 90 40 Q74 24 90 8Z" stroke-width="1.3"/>
    <line x1="90" y1="8" x2="90" y2="40" stroke-width="0.9"/>
    <line x1="82" y1="20" x2="98" y2="20" stroke-width="0.8"/>
