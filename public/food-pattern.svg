    <circle cx="66" cy="50" r="1.8"/>
    <circle cx="52" cy="52" r="1.2"/>
    <circle cx="68" cy="64" r="1.2"/>
  </g>

  <!-- Small stars (scattered) -->
  <g opacity="0.05" fill="#f5a623">
    <polygon points="60,8 61.2,11.6 65,11.6 62,14 63,17.6 60,15.5 57,17.6 58,14 55,11.6 58.8,11.6"/>
    <polygon points="10,90 10.8,92.5 13.5,92.5 11.4,94 12.2,96.5 10,95 7.8,96.5 8.6,94 6.5,92.5 9.2,92.5"/>
